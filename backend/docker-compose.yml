version: "3.9"

services:
  # ========================================
  # Backend API (Node.js + Express + TypeScript)
  # ========================================
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: crud_backend
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:${PORT:-3000}"
    environment:
      # use the DATABASE_URL from .env
      DATABASE_URL: ${DATABASE_URL}
      # Server
      PORT: ${PORT:-3000}
      NODE_ENV: ${NODE_ENV:-development}
      # Authentication
      AUTH_REQUIRED: ${AUTH_REQUIRED:-false}
      JWT_SECRET: ${JWT_SECRET:-your-super-secret-jwt-key-change-in-production}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-24h}
      # Email (SMTP)
      SMTP_HOST: ${SMTP_HOST:-smtp.gmail.com}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      SMTP_FROM: ${SMTP_FROM:-"Trasteros App"}
      FROM_EMAIL: ${FROM_EMAIL}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:5173}
    volumes:
      # Montar código fuente para hot reload en desarrollo
      - ./src:/app/src
      - ./prisma:/app/prisma
    networks:
      - crud_network
    # Comando personalizado: sincroniza la DB externa y luego inicia el servidor
    command: >
      sh -c "
        echo '⏳ Sincronizando con MariaDB externa...' &&
        npx prisma generate &&
        npx prisma db push &&
        echo '✅ Base de datos sincronizada' &&
        npm run dev
      "

# ========================================
# Red interna
# ========================================
networks:
  crud_network:
    driver: bridge
